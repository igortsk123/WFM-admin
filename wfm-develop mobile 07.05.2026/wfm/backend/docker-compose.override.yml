# Локальная разработка
# Подхватывается автоматически при `docker compose up`
# Добавляет: build из исходников, hot reload, volume mounts, n8n, порты

services:

  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n_user
      - DB_POSTGRESDB_PASSWORD=${N8N_DB_PASSWORD:-Pakar602}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-testA1234}
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_FILESYSTEM_ALLOW_LIST=/shared
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-}
      - N8N_LICENSE_ACTIVATION_KEY=${N8N_LICENSE_ACTIVATION_KEY:-}
      - GENERIC_TIMEZONE=Asia/Novosibirsk
      - N8N_DEFAULT_LOCALE=ru-RU
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678}
    volumes:
      - ./n8n_data:/home/node/.n8n
      - /srv/shared:/shared:Z
    user: root
    depends_on:
      postgres:
        condition: service_healthy

  svc_tasks:
    build:
      context: .
      dockerfile: svc_tasks/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./svc_tasks/app:/app/app
      - ./svc_tasks/alembic:/app/alembic
      - ./shared:/app/shared
    environment:
      DEBUG: "True"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  svc_users:
    build:
      context: .
      dockerfile: svc_users/Dockerfile
    ports:
      - "8001:8000"
    volumes:
      - ./svc_users/app:/app/app
      - ./svc_users/alembic:/app/alembic
      - ./shared:/app/shared
    environment:
      DEBUG: "True"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level info

  svc_notifications:
    build:
      context: .
      dockerfile: svc_notifications/Dockerfile
    ports:
      - "8003:8000"

