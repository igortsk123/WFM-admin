# Базовая конфигурация WFM Backend
# Используется совместно с environment-specific файлами:
#   Локально:  docker compose up  (автоматически подхватит docker-compose.override.yml)
#   Dev:       docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#   Prod:      docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:

  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-root}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      WFM_TASKS_DB_PASSWORD: ${WFM_TASKS_DB_PASSWORD:-wfm_tasks_password}
      WFM_USERS_DB_PASSWORD: ${WFM_USERS_DB_PASSWORD:-wfm_users_password}
      WFM_NOTIFICATIONS_DB_PASSWORD: ${WFM_NOTIFICATIONS_DB_PASSWORD:-wfm_notifications_password}
      TZ: Asia/Tomsk
      PGTZ: Asia/Tomsk
    command: postgres -c timezone='Asia/Tomsk'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-root}"]
      interval: 5s
      timeout: 5s
      retries: 5

  svc_tasks:
    image: registry.beyondviolet.com/wfm/svc_tasks:latest
    container_name: svc_tasks
    restart: unless-stopped
    environment:
      TZ: Asia/Tomsk
      DATABASE_URL: ${TASKS_DATABASE_URL:-postgresql://wfm_tasks_user:wfm_tasks_password@postgres:5432/wfm_tasks}
      DEBUG: ${DEBUG:-False}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-[]}
      LAMA_API_BASE_URL: ${LAMA_API_BASE_URL:-https://wfm-smart.lama70.ru/api/}
      LAMA_API_TIMEOUT: ${LAMA_API_TIMEOUT:-5}
      LAMA_API_ENABLED: ${LAMA_API_ENABLED:-true}
      USERS_SERVICE_URL: ${USERS_SERVICE_URL:-http://svc_users:8000}
      USERS_SERVICE_TIMEOUT: ${USERS_SERVICE_TIMEOUT:-5}
      NOTIFICATIONS_SERVICE_URL: ${NOTIFICATIONS_SERVICE_URL:-http://svc_notifications:8000}
      NOTIFICATIONS_SERVICE_TIMEOUT: ${NOTIFICATIONS_SERVICE_TIMEOUT:-3}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-https://s3.regru.cloud}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?Set S3_ACCESS_KEY in .env}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?Set S3_SECRET_KEY in .env}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-wfm-images}
      S3_PUBLIC_URL_PREFIX: ${S3_PUBLIC_URL_PREFIX:-https://wfm-images.website.regru.cloud}
      BV_PUBLIC_KEY: ${BV_PUBLIC_KEY:?Set BV_PUBLIC_KEY in .env}
      SEMETRICS_API_KEY: ${SEMETRICS_API_KEY:-}
      SEMETRICS_ENDPOINT: ${SEMETRICS_ENDPOINT:-https://semetrics.ru/events}
      SERVER_NAME: ${SERVER_NAME:-server}
    depends_on:
      postgres:
        condition: service_healthy
      svc_notifications:
        condition: service_started

  svc_users:
    image: registry.beyondviolet.com/wfm/svc_users:latest
    container_name: svc_users
    restart: unless-stopped
    environment:
      TZ: Asia/Tomsk
      DATABASE_URL: ${USERS_DATABASE_URL:-postgresql://wfm_users_user:wfm_users_password@postgres:5432/wfm_users}
      DEBUG: ${DEBUG:-False}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      HTTPX_LOG_LEVEL: ${HTTPX_LOG_LEVEL:-WARNING}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-[]}
      SSO_BASE_URL: ${SSO_BASE_URL:-https://api.beyondviolet.com/sys/v1}
      SSO_TIMEOUT: ${SSO_TIMEOUT:-5}
      SSO_CACHE_TTL: ${SSO_CACHE_TTL:-86400}
      LAMA_API_BASE_URL: ${LAMA_API_BASE_URL:-https://wfm-smart.lama70.ru/api/}
      LAMA_API_TIMEOUT: ${LAMA_API_TIMEOUT:-5}
      LAMA_API_ENABLED: ${LAMA_API_ENABLED:-true}
      LAMA_CACHE_TTL: ${LAMA_CACHE_TTL:-3600}
      BV_PUBLIC_KEY: ${BV_PUBLIC_KEY:?Set BV_PUBLIC_KEY in .env}
      PYTHONUNBUFFERED: "1"
      SEMETRICS_API_KEY: ${SEMETRICS_API_KEY:-}
      SEMETRICS_ENDPOINT: ${SEMETRICS_ENDPOINT:-https://semetrics.ru/events}
      SERVER_NAME: ${SERVER_NAME:-server}
    depends_on:
      postgres:
        condition: service_healthy

  svc_notifications:
    image: registry.beyondviolet.com/wfm/svc_notifications:latest
    container_name: svc_notifications
    restart: unless-stopped
    environment:
      TZ: Asia/Tomsk
      DATABASE_URL: ${NOTIFICATIONS_DATABASE_URL:-postgresql://wfm_notifications_user:wfm_notifications_password@postgres:5432/wfm_notifications}
      DEBUG: ${DEBUG:-False}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-[]}
      BV_PUBLIC_KEY: ${BV_PUBLIC_KEY:?Set BV_PUBLIC_KEY in .env}
      FIREBASE_CREDENTIALS_JSON: ${FIREBASE_CREDENTIALS_JSON:-}
      HMS_APP_ID: ${HMS_APP_ID:-}
      HMS_CLIENT_SECRET: ${HMS_CLIENT_SECRET:-}
      WS_ACK_TIMEOUT: ${WS_ACK_TIMEOUT:-5}
      USERS_SERVICE_URL: ${USERS_SERVICE_URL:-http://svc_users:8000}
      USERS_SERVICE_TIMEOUT: ${USERS_SERVICE_TIMEOUT:-5}
      SEMETRICS_API_KEY: ${SEMETRICS_API_KEY:-}
      SEMETRICS_ENDPOINT: ${SEMETRICS_ENDPOINT:-https://semetrics.ru/events}
      SERVER_NAME: ${SERVER_NAME:-server}
    depends_on:
      postgres:
        condition: service_healthy
      svc_users:
        condition: service_started

  svc_monitoring:
    image: registry.beyondviolet.com/wfm/svc_monitoring:latest
    container_name: svc_monitoring
    restart: unless-stopped
    pid: "host"
    ports:
      - "8004:8000"
    volumes:
      - /:/hostfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      TZ: Asia/Tomsk
      SEMETRICS_API_KEY: ${SEMETRICS_API_KEY:-}
      SEMETRICS_ENDPOINT: ${SEMETRICS_ENDPOINT:-https://semetrics.ru/events}
      SERVER_NAME: ${SERVER_NAME:-server}
      METRICS_INTERVAL: ${METRICS_INTERVAL:-60}
      DEVICE_TOKEN: ${MONITORING_DEVICE_TOKEN:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').getcode()==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
