[env:esp32s3]
; Временное устройство #2: Guition JC4827W543N (480×272, NV3041A, QSPI)
; Используем квадратную область 272×272 (x_offset=104) — приближение к целевому 480×480 AMOLED
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

lib_deps =
    moononournation/GFX Library for Arduino @ ^1.6.5
    links2004/WebSockets @ ^2.4.1
    bblanchon/ArduinoJson @ ^7.2.0

monitor_speed = 115200
upload_speed = 921600
upload_protocol = esptool

; ESP32-S3 N4R8: OPI PSRAM (8 MB)
board_build.arduino.memory_type = qio_opi
board_build.partitions = huge_app.csv

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DCONFIG_ARDUINO_LOOP_STACK_SIZE=65536
    ; JC4827W543N backlight pin
    -DGFX_BL=1
