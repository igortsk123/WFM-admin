<script type="text/babel">

/* ═══════════════════════════════════════════
   SHARED PRIMITIVES
═══════════════════════════════════════════ */

// Arc gauge (SVG-based)
function ArcGauge({ value, size = 180, strokeW = 14, color, label, sublabel }) {
  const r = (size - strokeW) / 2;
  const cx = size / 2, cy = size / 2;
  const circumference = Math.PI * r; // half circle arc
  const startAngle = 210; // degrees
  const sweep = 300; // total sweep degrees
  const sweepRad = sweep * Math.PI / 180;
  const startRad = startAngle * Math.PI / 180;

  function polarToCart(angle) {
    const rad = angle * Math.PI / 180;
    return [cx + r * Math.cos(rad), cy + r * Math.sin(rad)];
  }
  const [sx, sy] = polarToCart(startAngle);
  const endAngle = startAngle + sweep;
  const [ex, ey] = polarToCart(endAngle);

  const pct = value < 0 ? 0 : Math.min(value, 100) / 100;
  const fillAngle = startAngle + sweep * pct;
  const [fx, fy] = polarToCart(fillAngle);

  function describeArc(a1, a2) {
    const [x1, y1] = polarToCart(a1);
    const [x2, y2] = polarToCart(a2);
    const largeArc = (a2 - a1) > 180 ? 1 : 0;
    return `M ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2}`;
  }

  const trackPath = describeArc(startAngle, endAngle);
  const fillPath = pct > 0 ? describeArc(startAngle, Math.min(fillAngle, endAngle - 0.1)) : '';

  return (
    <svg width={size} height={size} style={{display:'block'}}>
      {/* track */}
      <path d={trackPath} fill="none" stroke="#1C2433" strokeWidth={strokeW} strokeLinecap="round"/>
      {/* fill */}
      {pct > 0 && <path d={fillPath} fill="none" stroke={color} strokeWidth={strokeW} strokeLinecap="round"
        style={{filter:`drop-shadow(0 0 6px ${color}88)`}}/>}
      {/* center label */}
      <text x={cx} y={cy - 10} textAnchor="middle" fill="#fff" fontSize="44" fontWeight="700"
        fontFamily="Space Mono, monospace">
        {value < 0 ? '—' : Math.round(value)}
      </text>
      <text x={cx} y={cy + 22} textAnchor="middle" fill="#fff" fontSize="18" fontWeight="400"
        fontFamily="Space Mono, monospace">
        {value < 0 ? '' : '%'}
      </text>
      {label && <text x={cx} y={cy + 54} textAnchor="middle" fill="#8896A8" fontSize="15"
        fontFamily="Space Mono, monospace">{label}</text>}
    </svg>
  );
}

// Small arc gauge
function SmallArcGauge({ value, size = 150, strokeW = 12, color, label }) {
  const r = (size - strokeW) / 2;
  const cx = size / 2, cy = size / 2;
  const startAngle = 210;
  const sweep = 300;

  function polarToCart(angle) {
    const rad = angle * Math.PI / 180;
    return [cx + r * Math.cos(rad), cy + r * Math.sin(rad)];
  }

  function describeArc(a1, a2) {
    const [x1, y1] = polarToCart(a1);
    const [x2, y2] = polarToCart(a2);
    const largeArc = (a2 - a1) > 180 ? 1 : 0;
    return `M ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2}`;
  }

  const pct = value < 0 ? 0 : Math.min(value, 100) / 100;
  const endAngle = startAngle + sweep;
  const fillAngle = startAngle + sweep * pct;
  const trackPath = describeArc(startAngle, endAngle);
  const fillPath = pct > 0 ? describeArc(startAngle, Math.min(fillAngle, endAngle - 0.1)) : '';

  return (
    <svg width={size} height={size} style={{display:'block'}}>
      <path d={trackPath} fill="none" stroke="#1C2433" strokeWidth={strokeW} strokeLinecap="round"/>
      {pct > 0 && <path d={fillPath} fill="none" stroke={color} strokeWidth={strokeW} strokeLinecap="round"
        style={{filter:`drop-shadow(0 0 5px ${color}88)`}}/>}
      <text x={cx} y={cy - 6} textAnchor="middle" fill="#fff" fontSize="32" fontWeight="700"
        fontFamily="Space Mono, monospace">
        {value < 0 ? '—' : Math.round(value)}
      </text>
      <text x={cx} y={cy + 20} textAnchor="middle" fill="#8896A8" fontSize="13"
        fontFamily="Space Mono, monospace">
        {value < 0 ? '' : '%'}
      </text>
      {label && <text x={cx} y={cy + 46} textAnchor="middle" fill="#8896A8" fontSize="13"
        fontFamily="Space Mono, monospace">{label}</text>}
    </svg>
  );
}

// Live dot
function LiveDot({ stale = false }) {
  return (
    <div style={{display:'flex', alignItems:'center', gap:8}}>
      <div style={{
        width:10, height:10, borderRadius:'50%',
        background: stale ? '#4A5568' : '#00E676',
        boxShadow: stale ? 'none' : '0 0 8px #00E67699',
        animation: stale ? 'none' : 'pulse 2s infinite'
      }}/>
      <span style={{color:'#8896A8', fontSize:13, fontFamily:'Space Mono, monospace'}}>
        {stale ? 'STALE' : 'LIVE'}
      </span>
      <style>{`@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }`}</style>
    </div>
  );
}

function gaugeColor(v) {
  if (v < 0) return '#4A5568';
  if (v < 70) return '#00E676';
  if (v < 90) return '#FFB300';
  return '#FF3D3D';
}


/* ═══════════════════════════════════════════
   SCREEN 1 — METRICS
═══════════════════════════════════════════ */
function ScreenMetrics({ cpu = 73, mem = 48, disk = 91, stale = false }) {
  return (
    <div className="display" style={{display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'space-between', padding:'36px 32px 32px'}}>

      {/* header */}
      <div style={{width:'100%', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
        <span style={{color:'#8896A8', fontSize:13, letterSpacing:3}}>SERVER</span>
        <LiveDot stale={stale}/>
      </div>

      {/* main metric — CPU, dominant */}
      <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:2}}>
        <ArcGauge value={cpu} size={210} strokeW={16} color={gaugeColor(cpu)} label="CPU"/>
      </div>

      {/* two secondary metrics */}
      <div style={{display:'flex', gap:24, justifyContent:'center'}}>
        <div style={{display:'flex', flexDirection:'column', alignItems:'center'}}>
          <SmallArcGauge value={mem} size={152} strokeW={12} color={gaugeColor(mem)} label="MEM"/>
        </div>
        <div style={{display:'flex', flexDirection:'column', alignItems:'center'}}>
          <SmallArcGauge value={disk} size={152} strokeW={12} color={gaugeColor(disk)} label="DISK"/>
        </div>
      </div>
    </div>
  );
}


/* ═══════════════════════════════════════════
   SCREEN 2 — CONTAINERS
═══════════════════════════════════════════ */
const STATUS_META = {
  Healthy:   { color: '#00E676', label: 'Healthy' },
  Starting:  { color: '#FFB300', label: 'Starting' },
  Unhealthy: { color: '#FF3D3D', label: 'Unhealthy' },
  Stopped:   { color: '#4A5568', label: 'Stopped' },
  Unknown:   { color: '#4A5568', label: 'Unknown' },
};

function ServiceRow({ name, status, primary = false }) {
  const meta = STATUS_META[status] || STATUS_META.Unknown;
  return (
    <div style={{
      display:'flex', alignItems:'center', gap:18,
      background: primary ? '#141920' : 'transparent',
      border: primary ? `1px solid ${meta.color}33` : '1px solid #1C2433',
      borderLeft: `4px solid ${meta.color}`,
      borderRadius:12,
      padding: primary ? '18px 20px' : '14px 20px',
      position:'relative',
    }}>
      {/* status dot */}
      <div style={{
        width: primary ? 14 : 11,
        height: primary ? 14 : 11,
        borderRadius:'50%',
        background: meta.color,
        flexShrink:0,
        boxShadow: `0 0 8px ${meta.color}88`,
      }}/>

      {/* name + status */}
      <div style={{flex:1, display:'flex', flexDirection:'column', gap:3}}>
        <span style={{
          fontSize: primary ? 22 : 17,
          fontWeight:700, color:'#fff',
          fontFamily:'Space Mono, monospace',
          letterSpacing: primary ? 0 : 0.5,
        }}>{name}</span>
        <span style={{fontSize:12, color: meta.color, fontFamily:'Space Mono, monospace',
          letterSpacing:1}}>{meta.label.toUpperCase()}</span>
      </div>

      {/* critical badge */}
      {primary && <span style={{
        fontSize:10, color:'#8896A8', border:'1px solid #2a3444',
        borderRadius:4, padding:'2px 6px', fontFamily:'Space Mono, monospace',
        letterSpacing:1,
      }}>DB</span>}
    </div>
  );
}

function ScreenContainers({ services }) {
  const defaultServices = [
    { name: 'postgres',         status: 'Healthy',   primary: true },
    { name: 'svc_tasks',        status: 'Healthy',   primary: false },
    { name: 'svc_users',        status: 'Starting',  primary: false },
    { name: 'svc_notifications',status: 'Stopped',   primary: false },
  ];
  const list = services || defaultServices;

  return (
    <div className="display" style={{display:'flex', flexDirection:'column',
      padding:'36px 32px', gap:16}}>
      {/* header */}
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:4}}>
        <span style={{color:'#8896A8', fontSize:13, letterSpacing:3}}>CONTAINERS</span>
        <LiveDot/>
      </div>

      {list.map((s, i) => <ServiceRow key={i} {...s}/>)}
    </div>
  );
}


/* ═══════════════════════════════════════════
   SCREEN 3 — ERRORS
═══════════════════════════════════════════ */
function ErrorArc({ value }) {
  const max = 10;
  const pct = Math.min(value, max) / max;
  const size = 240;
  const strokeW = 18;
  const r = (size - strokeW) / 2;
  const cx = size / 2, cy = size / 2 + 20;
  const startAngle = 200;
  const sweep = 140;

  function polarToCart(angle) {
    const rad = angle * Math.PI / 180;
    return [cx + r * Math.cos(rad), cy + r * Math.sin(rad)];
  }
  function describeArc(a1, a2) {
    const [x1, y1] = polarToCart(a1);
    const [x2, y2] = polarToCart(a2);
    const largeArc = (a2 - a1) > 180 ? 1 : 0;
    return `M ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2}`;
  }

  const endAngle = startAngle + sweep;
  const fillAngle = startAngle + sweep * pct;

  // segment colors
  const segments = [
    { from: startAngle,                  to: startAngle + sweep * 0.4,  color: '#00E676' },
    { from: startAngle + sweep * 0.4,    to: startAngle + sweep * 0.75, color: '#FFB300' },
    { from: startAngle + sweep * 0.75,   to: endAngle,                  color: '#FF3D3D' },
  ];

  const color = value === 0 ? '#00E676' : value < 5 ? '#FFB300' : '#FF3D3D';

  return (
    <svg width={size} height={size * 0.75} viewBox={`0 0 ${size} ${size * 0.75}`} style={{display:'block', overflow:'visible'}}>
      {/* track segments */}
      {segments.map((seg, i) => (
        <path key={i} d={describeArc(seg.from, seg.to)} fill="none"
          stroke={seg.color} strokeWidth={strokeW} strokeLinecap="butt" opacity="0.18"/>
      ))}
      {/* fill */}
      {pct > 0 && <path d={describeArc(startAngle, Math.min(fillAngle, endAngle - 0.1))}
        fill="none" stroke={color} strokeWidth={strokeW} strokeLinecap="round"
        style={{filter:`drop-shadow(0 0 8px ${color}aa)`}}/>}
      {/* needle dot */}
      {(() => {
        const [nx, ny] = polarToCart(fillAngle);
        return <circle cx={nx} cy={ny} r={10} fill={color}
          style={{filter:`drop-shadow(0 0 6px ${color})`}}/>;
      })()}
    </svg>
  );
}

function ScreenErrors({ count = 3 }) {
  const color = count === 0 ? '#00E676' : count < 5 ? '#FFB300' : '#FF3D3D';
  const label = count === 0 ? 'ALL CLEAR' : count < 5 ? 'ELEVATED' : 'CRITICAL';

  return (
    <div className="display" style={{display:'flex', flexDirection:'column',
      alignItems:'center', padding:'36px 32px 32px', gap:0}}>
      {/* header */}
      <div style={{width:'100%', display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16}}>
        <span style={{color:'#8896A8', fontSize:13, letterSpacing:3}}>ERRORS</span>
        <LiveDot/>
      </div>

      {/* arc */}
      <div style={{marginBottom:-10}}>
        <ErrorArc value={count}/>
      </div>

      {/* big number */}
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:96, fontWeight:700, color, lineHeight:1,
          fontFamily:'Space Mono, monospace',
          textShadow:`0 0 30px ${color}66`}}>
          {count}
        </div>
        <div style={{fontSize:13, color:'#8896A8', fontFamily:'Space Mono, monospace',
          marginTop:8, letterSpacing:2}}>
          ERRORS / 1H
        </div>
      </div>

      {/* status pill */}
      <div style={{
        marginTop:20,
        background: `${color}22`, border:`1px solid ${color}55`,
        borderRadius:8, padding:'8px 24px',
        fontSize:14, fontWeight:700, color, fontFamily:'Space Mono, monospace',
        letterSpacing:2,
      }}>{label}</div>

      {/* scale legend */}
      <div style={{display:'flex', gap:24, marginTop:16}}>
        {[{c:'#00E676', t:'0'},{c:'#FFB300', t:'1–4'},{c:'#FF3D3D', t:'5+'}].map(({c,t}) => (
          <div key={t} style={{display:'flex', alignItems:'center', gap:5}}>
            <div style={{width:8, height:8, borderRadius:'50%', background:c}}/>
            <span style={{fontSize:11, color:'#8896A8', fontFamily:'Space Mono, monospace'}}>{t}</span>
          </div>
        ))}
      </div>
    </div>
  );
}


/* ═══════════════════════════════════════════

      <path d="M22 52 Q50 28 78 52" stroke="#4A5568" strokeWidth="8" strokeLinecap="round" fill="none"/>
      <path d="M35 65 Q50 53 65 65" stroke="#4A5568" strokeWidth="8" strokeLinecap="round" fill="none"/>
      <circle cx="50" cy="78" r="5" fill="#4A5568"/>
      {/* X */}
      <line x1="72" y1="18" x2="92" y2="38" stroke="#FF3D3D" strokeWidth="7" strokeLinecap="round"/>
      <line x1="92" y1="18" x2="72" y2="38" stroke="#FF3D3D" strokeWidth="7" strokeLinecap="round"/>
    </svg>

function ServerOffIcon({ size = 100 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 100 100" fill="none">
      {/* server body */}
      <rect x="15" y="20" width="55" height="20" rx="4" stroke="#4A5568" strokeWidth="6" fill="none"/>
      <rect x="15" y="48" width="55" height="20" rx="4" stroke="#4A5568" strokeWidth="6" fill="none"/>
      <circle cx="27" cy="30" r="3" fill="#4A5568"/>
      <circle cx="27" cy="58" r="3" fill="#4A5568"/>
      {/* X */}
      <line x1="72" y1="18" x2="92" y2="38" stroke="#FF3D3D" strokeWidth="7" strokeLinecap="round"/>
      <line x1="92" y1="18" x2="72" y2="38" stroke="#FF3D3D" strokeWidth="7" strokeLinecap="round"/>
    </svg>
  );
}

function ScreenNoWifi() {
  return (
    <div className="display" style={{display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center', padding:'36px', gap:24}}>
      <WifiOffIcon size={120}/>
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:36, fontWeight:700, color:'#FF3D3D',
          fontFamily:'Space Mono, monospace', letterSpacing:2}}>NO WIFI</div>
        <div style={{fontSize:14, color:'#4A5568', fontFamily:'Space Mono, monospace',
          marginTop:12, letterSpacing:1}}>No network connection</div>
      </div>
      {/* pulsing retry indicator */}
      <div style={{display:'flex', gap:6, marginTop:8}}>
        {[0,1,2].map(i => (
          <div key={i} style={{
            width:8, height:8, borderRadius:'50%', background:'#4A5568',
            animation:`dotpulse 1.4s ${i*0.2}s infinite ease-in-out`,
          }}/>
        ))}
      </div>
      <style>{`@keyframes dotpulse{0%,80%,100%{opacity:0.2}40%{opacity:1}}`}</style>
    </div>

}

function ScreenNoServer({ ssid = 'MyNetwork_5G' }) {
  return (
    <div className="display" style={{display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center', padding:'36px', gap:20}}>
      <ServerOffIcon size={120}/>
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:32, fontWeight:700, color:'#FF3D3D',
          fontFamily:'Space Mono, monospace', letterSpacing:2}}>NO SERVER</div>
        <div style={{fontSize:13, color:'#8896A8', fontFamily:'Space Mono, monospace',
          marginTop:10, letterSpacing:1}}>Server not responding</div>
      </div>

      {/* wifi confirmation */}
      <div style={{
        background:'#141920', border:'1px solid #1C2433',
        borderLeft:'3px solid #00E676',
        borderRadius:10, padding:'12px 20px',
        display:'flex', alignItems:'center', gap:12, marginTop:4,
      }}>
        <div style={{width:8, height:8, borderRadius:'50%', background:'#00E676',
          boxShadow:'0 0 6px #00E676'}}/>
        <div>
          <div style={{fontSize:10, color:'#8896A8', fontFamily:'Space Mono, monospace',
            letterSpacing:2}}>WIFI OK</div>
          <div style={{fontSize:15, color:'#fff', fontFamily:'Space Mono, monospace',
            marginTop:2}}>{ssid}</div>
        </div>
      </div>

/* ═══════════════════════════════════════════
   SCREEN 5 — ALERT
═══════════════════════════════════════════ */
function AlertIcon({ color, size = 80 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 80 80" fill="none">
      <polygon points="40,8 76,70 4,70" stroke={color} strokeWidth="5"
        fill={`${color}18`} strokeLinejoin="round"/>
      <line x1="40" y1="30" x2="40" y2="50" stroke={color} strokeWidth="6" strokeLinecap="round"/>
      <circle cx="40" cy="60" r="4" fill={color}/>
    </svg>
  );
}

function ScreenAlert({ level = 'critical', message = 'Database connection lost. Retrying...' }) {
  const isCrit = level === 'critical';
  const color = isCrit ? '#FF3D3D' : '#FFB300';
  const levelLabel = isCrit ? 'CRITICAL' : 'WARNING';

  return (
    <div className="display" style={{display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'space-between', padding:0, overflow:'hidden'}}>

      {/* top accent bar */}
      <div style={{
        width:'100%', height:10,
        background: color,
        boxShadow: `0 0 20px ${color}`,
      }}/>

      {/* content */}
      <div style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center',
        justifyContent:'center', padding:'24px 40px', gap:20}}>

        {/* level label */}
        <div style={{
          fontSize:12, color, fontFamily:'Space Mono, monospace', letterSpacing:4,
          border:`1px solid ${color}44`, borderRadius:4,
          padding:'4px 12px', background:`${color}11`,
        }}>{levelLabel}</div>

        {/* icon */}
        <AlertIcon color={color} size={96}/>

        {/* message */}
        <div style={{
          textAlign:'center', fontSize:20, color:'#fff',
          fontFamily:'Space Mono, monospace', lineHeight:1.5,
          textShadow: '0 0 20px rgba(0,0,0,0.8)',
          maxWidth: 360,
        }}>
          {message}
        </div>
      </div>

      {/* bottom accent bar */}
      <div style={{
        width:'100%', height:6,
        background: `${color}66`,
      }}/>
    </div>
  );
}


function ScreenAlertWarning() {
  return <ScreenAlert level="warning" message="High memory usage detected. 89% used"/>;
}


/* ═══════════════════════════════════════════
   SCREEN 0 — DASHBOARD (all-in-one)
═══════════════════════════════════════════ */

function MiniBar({ value, color, label }) {
  const pct = value < 0 ? 0 : Math.min(value, 100);
  const c = value < 0 ? '#4A5568' : color;
  return (
    <div style={{display:'flex', alignItems:'center', gap:10}}>
      <span style={{fontSize:12, color:'#8896A8', fontFamily:'Space Mono, monospace',
        width:32, flexShrink:0}}>{label}</span>
      <div style={{flex:1, height:8, background:'#1C2433', borderRadius:4, overflow:'hidden'}}>
        <div style={{width:`${pct}%`, height:'100%', background:c, borderRadius:4,
          boxShadow:`0 0 6px ${c}88`, transition:'width 0.3s'}}/>
      </div>
      <span style={{fontSize:12, color: value < 0 ? '#4A5568' : '#fff',
        fontFamily:'Space Mono, monospace', width:30, textAlign:'right', flexShrink:0}}>
        {value < 0 ? '—' : `${Math.round(value)}%`}
      </span>
    </div>
  );
}

function MiniServiceRow({ name, status }) {
  const meta = STATUS_META[status] || STATUS_META.Unknown;
  const shortName = name.replace('svc_', '');
  return (
    <div style={{display:'flex', alignItems:'center', gap:8, padding:'6px 10px',
      background:'#141920', borderRadius:8, borderLeft:`3px solid ${meta.color}`}}>
      <div style={{width:7, height:7, borderRadius:'50%', background:meta.color,
        flexShrink:0, boxShadow:`0 0 5px ${meta.color}88`}}/>
      <span style={{fontSize:12, color:'#fff', fontFamily:'Space Mono, monospace',
        flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{shortName}</span>
      <span style={{fontSize:10, color:meta.color, fontFamily:'Space Mono, monospace',
        letterSpacing:0.5}}>{meta.label.toUpperCase()}</span>
    </div>
  );
}

function WifiIconSmall({ ok }) {
  return ok ? (
    <svg width={22} height={18} viewBox="0 0 22 18" fill="none">
      <path d="M1 5 Q11 -1 21 5" stroke="#00E676" strokeWidth="2.5" strokeLinecap="round" fill="none"/>
      <path d="M4 9 Q11 4 18 9" stroke="#00E676" strokeWidth="2.5" strokeLinecap="round" fill="none"/>
      <path d="M7.5 13 Q11 10 14.5 13" stroke="#00E676" strokeWidth="2.5" strokeLinecap="round" fill="none"/>
      <circle cx="11" cy="16.5" r="2" fill="#00E676"/>
    </svg>
  ) : (
    <svg width={22} height={18} viewBox="0 0 22 18" fill="none">
      <path d="M1 5 Q11 -1 21 5" stroke="#4A5568" strokeWidth="2.5" strokeLinecap="round" fill="none"/>
      <path d="M4 9 Q11 4 18 9" stroke="#4A5568" strokeWidth="2.5" strokeLinecap="round" fill="none"/>
      <path d="M7.5 13 Q11 10 14.5 13" stroke="#4A5568" strokeWidth="2.5" strokeLinecap="round" fill="none"/>
      <circle cx="11" cy="16.5" r="2" fill="#4A5568"/>
      <line x1="16" y1="1" x2="22" y2="7" stroke="#FF3D3D" strokeWidth="2" strokeLinecap="round"/>
      <line x1="22" y1="1" x2="16" y2="7" stroke="#FF3D3D" strokeWidth="2" strokeLinecap="round"/>
    </svg>
  );
}

function ScreenDashboard({
  cpu = 73, mem = 48, disk = 91,
  services = [
    {name:'postgres',         status:'Healthy', primary:true},
    {name:'svc_tasks',        status:'Healthy'},
    {name:'svc_users',        status:'Healthy'},
    {name:'svc_notifications',status:'Healthy'},
  ],
  errors = 0,
  wifiOk = true,
  serverOk = true,
  noConnDuration = '12m 34s',
}) {
  const errColor = errors === 0 ? '#00E676' : errors < 5 ? '#FFB300' : '#FF3D3D';

  return (
    <div className="display" style={{
      display:'flex', flexDirection:'column',
      padding:'32px 28px 28px', gap:14,
    }}>

      {/* ── HEADER ── */}
      <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
        <span style={{color:'#fff', fontSize:15, fontWeight:700, letterSpacing:3,
          fontFamily:'Space Mono, monospace'}}>WFM</span>
        <div style={{display:'flex', alignItems:'center', gap:12}}>
          {(!wifiOk || !serverOk) && (
            <span style={{fontSize:11, color:'#FF3D3D', fontFamily:'Space Mono, monospace',
              letterSpacing:1, display:'flex', alignItems:'center', gap:5}}>
              <span style={{color:'#4A5568'}}>NO {!wifiOk ? 'WIFI' : 'SERVER'}</span>
              <span style={{color:'#FF3D3D'}}>{noConnDuration}</span>
            </span>
          )}
          <WifiIconSmall ok={wifiOk}/>
          <LiveDot stale={!wifiOk || !serverOk}/>
        </div>
      </div>

      {/* ── DIVIDER ── */}
      <div style={{height:1, background:'#1C2433'}}/>

      {/* ── METRICS ── */}
      <div style={{display:'flex', flexDirection:'column', gap:9}}>
        <span style={{fontSize:10, color:'#4A5568', letterSpacing:3,
          fontFamily:'Space Mono, monospace'}}>METRICS</span>
        <MiniBar value={cpu}  label="CPU"  color={gaugeColor(cpu)}/>
        <MiniBar value={mem}  label="MEM"  color={gaugeColor(mem)}/>
        <MiniBar value={disk} label="DISK" color={gaugeColor(disk)}/>
      </div>

      {/* ── DIVIDER ── */}
      <div style={{height:1, background:'#1C2433'}}/>

      {/* ── CONTAINERS ── */}
      <div style={{display:'flex', flexDirection:'column', gap:7}}>
        <span style={{fontSize:10, color:'#4A5568', letterSpacing:3,
          fontFamily:'Space Mono, monospace'}}>CONTAINERS</span>
        {services.map((s, i) => <MiniServiceRow key={i} {...s}/>)}
      </div>

      {/* ── DIVIDER ── */}
      <div style={{height:1, background:'#1C2433'}}/>

      {/* ── ERRORS ── */}
      <div style={{display:'flex', alignItems:'center', justifyContent:'space-between'}}>
        <span style={{fontSize:10, color:'#4A5568', letterSpacing:3,
          fontFamily:'Space Mono, monospace'}}>ERRORS / 1H</span>
        <div style={{display:'flex', alignItems:'center', gap:10}}>

          <div style={{
            background:`${errColor}22`, border:`1px solid ${errColor}55`,
            borderRadius:7, padding:'4px 14px',
            fontSize:22, fontWeight:700, color:errColor,
            fontFamily:'Space Mono, monospace',
            textShadow:`0 0 12px ${errColor}88`,
          }}>{errors}</div>
        </div>
      </div>

    </div>
  );
}


/* ═══════════════════════════════════════════
   MAIN CANVAS
═══════════════════════════════════════════ */
function App() {
  return (
    <DesignCanvas>
      <DCSection id="s1" title="Screen 1 — METRICS">
        <DCArtboard id="m1" label="2+1 layout — nominal" width={480} height={480}>
          <ScreenMetrics cpu={73} mem={48} disk={91}/>
        </DCArtboard>
        <DCArtboard id="m2" label="high load state" width={480} height={480}>
          <ScreenMetrics cpu={96} mem={88} disk={91}/>
        </DCArtboard>
        <DCArtboard id="m3" label="no data (—)" width={480} height={480}>
          <ScreenMetrics cpu={-1} mem={-1} disk={-1} stale={true}/>
        </DCArtboard>
      </DCSection>

      <DCSection id="s2" title="Screen 2 — CONTAINERS">
        <DCArtboard id="c1" label="all healthy" width={480} height={480}>
          <ScreenContainers services={[
            {name:'postgres', status:'Healthy', primary:true},
            {name:'svc_tasks', status:'Healthy'},
            {name:'svc_users', status:'Healthy'},
            {name:'svc_notifications', status:'Healthy'},
          ]}/>
        </DCArtboard>
        <DCArtboard id="c2" label="degraded state" width={480} height={480}>
          <ScreenContainers/>
        </DCArtboard>
        <DCArtboard id="c3" label="critical failure" width={480} height={480}>
          <ScreenContainers services={[
            {name:'postgres', status:'Unhealthy', primary:true},
            {name:'svc_tasks', status:'Unhealthy'},
            {name:'svc_users', status:'Stopped'},
            {name:'svc_notifications', status:'Unknown'},
          ]}/>
        </DCArtboard>
      </DCSection>

      <DCSection id="s3" title="Screen 3 — ERRORS">
        <DCArtboard id="e1" label="0 errors — clear" width={480} height={480}>
          <ScreenErrors count={0}/>
        </DCArtboard>
        <DCArtboard id="e2" label="3 errors — elevated" width={480} height={480}>
          <ScreenErrors count={3}/>
        </DCArtboard>
        <DCArtboard id="e3" label="7 errors — critical" width={480} height={480}>
          <ScreenErrors count={7}/>
        </DCArtboard>
      </DCSection>

      <DCSection id="s0" title="Dashboard — всё на одном экране">
        <DCArtboard id="d1" label="nominal" width={480} height={480}>
          <ScreenDashboard/>
        </DCArtboard>
        <DCArtboard id="d2" label="degraded" width={480} height={480}>
          <ScreenDashboard
            cpu={94} mem={87} disk={91}
            services={[
              {name:'postgres', status:'Healthy', primary:true},
              {name:'svc_tasks', status:'Unhealthy'},
              {name:'svc_users', status:'Starting'},
              {name:'svc_notifications', status:'Stopped'},
            ]}
            errors={6}
            wifiOk={true}
          />
        </DCArtboard>
        <DCArtboard id="d3" label="no wifi" width={480} height={480}>
          <ScreenDashboard wifiOk={false} serverOk={false} noConnDuration="12m 34s"/>
        </DCArtboard>
      </DCSection>

      <DCSection id="s4" title="Screen 4 — NO CONNECTION">
        <DCArtboard id="n1" label="NO WIFI" width={480} height={480}>
          <ScreenNoWifi/>
        </DCArtboard>
        <DCArtboard id="n2" label="NO SERVER (wifi OK)" width={480} height={480}>
          <ScreenNoServer ssid="MyNetwork_5G"/>
        </DCArtboard>
      </DCSection>

      <DCSection id="s5" title="Screen 5 — ALERT">
        <DCArtboard id="a1" label="CRITICAL" width={480} height={480}>
          <ScreenAlert level="critical" message="Database connection lost. Retrying..."/>
        </DCArtboard>
        <DCArtboard id="a2" label="WARNING" width={480} height={480}>
          <ScreenAlertWarning/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
