name: Deploy to wfm.prodstor.com

on:
  push:
    branches: [main]
  # Manual trigger из Actions UI — для retry если что-то сломалось
  workflow_dispatch:

# Одновременно только 1 deploy. Если приходит новый push пока идёт билд —
# отменяем текущий и запускаем новый (свежий main всегда в приоритете).
concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type check (gate)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install --no-audit --no-fund
      - run: npx tsc --noEmit

  deploy:
    name: Build + blue-green swap
    needs: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          # Билд может занять 4-5 мин на этом сервере
          command_timeout: 15m
          script_stop: true
          script: |
            set -euo pipefail

            echo "::group::Pull latest main"
            cd /opt/wfm-admin
            git fetch origin main
            git reset --hard origin/main
            git log -1 --oneline
            echo "::endgroup::"

            echo "::group::Ensure docker buildx (idempotent)"
            # buildx нужен для BuildKit cache mounts (.next/cache, npm cache).
            # Установка БИНАРНИКОМ в user-local cli-plugins — НЕ трогает docker
            # daemon, НЕ требует sudo, НЕ перезапускает другие контейнеры на сервере.
            if ! docker buildx version >/dev/null 2>&1; then
              echo "buildx отсутствует — ставим user-local binary"

              # Snapshot других контейнеров ДО установки (sanity check).
              CONTAINERS_BEFORE=$(docker ps --format '{{.Names}}' | sort | tr '\n' ',' | sed 's/,$//')
              echo "Running containers before: $CONTAINERS_BEFORE"

              mkdir -p ~/.docker/cli-plugins
              # Pin стабильную версию (не latest — чтобы избежать сюрпризов).
              BUILDX_VERSION="v0.17.1"
              if ! curl -sSL --fail \
                "https://github.com/docker/buildx/releases/download/${BUILDX_VERSION}/buildx-${BUILDX_VERSION}.linux-amd64" \
                -o ~/.docker/cli-plugins/docker-buildx; then
                echo "ERROR: не смог скачать buildx binary — пропускаем, билд пойдёт legacy путём"
              else
                chmod +x ~/.docker/cli-plugins/docker-buildx
                docker buildx version || echo "WARN: buildx скачан но не работает"
              fi

              # Verify ничего не упало.
              CONTAINERS_AFTER=$(docker ps --format '{{.Names}}' | sort | tr '\n' ',' | sed 's/,$//')
              if [ "$CONTAINERS_BEFORE" != "$CONTAINERS_AFTER" ]; then
                echo "WARNING: список контейнеров изменился!"
                echo "Before: $CONTAINERS_BEFORE"
                echo "After:  $CONTAINERS_AFTER"
              else
                echo "OK: другие контейнеры не тронуты ($CONTAINERS_BEFORE)"
              fi
            else
              echo "buildx уже установлен: $(docker buildx version 2>&1 | head -1)"
            fi
            echo "::endgroup::"

            echo "::group::Pre-build cleanup"
            # Чистим dangling images. Builder cache ослаблен с 2h до 24h, чтобы
            # BuildKit cache mounts (.next/cache, npm cache из Dockerfile) жили
            # между деплоями в течение дня. Tagged images НЕ удаляются.
            docker image prune -f 2>&1 | tail -3
            docker builder prune -f --filter "until=24h" 2>&1 | tail -3
            df -h / | tail -1
            echo "::endgroup::"

            echo "::group::Build new image"
            # DOCKER_BUILDKIT=1 — нужен для --mount=type=cache в Dockerfile.
            # buildx ставится в шаге выше (idempotent).
            export DOCKER_BUILDKIT=1
            # Не использую `| tail` или PIPESTATUS — appleboy/ssh-action иногда
            # запускает скрипт в sh, где PIPESTATUS не работает.
            # `if !` достоверно ловит exit-code в любом POSIX shell.
            if ! docker build -t wfm-admin:new . > /tmp/wfm-build.log 2>&1; then
              echo "BUILD FAILED — НЕ трогаем running контейнер"
              tail -60 /tmp/wfm-build.log
              exit 1
            fi
            # Финальный exit-tail для CI лога (для удобства диагностики при success)
            tail -10 /tmp/wfm-build.log
            # Sanity: image должен существовать
            docker image inspect wfm-admin:new > /dev/null
            echo "::endgroup::"

            echo "::group::Blue-green swap"
            # Сохраним предыдущий image как :prev — возможный откат через workflow_dispatch
            if docker images wfm-admin:latest -q | grep -q .; then
              docker tag wfm-admin:latest wfm-admin:prev
            fi
            docker stop wfm-admin 2>/dev/null || true
            docker rm wfm-admin 2>/dev/null || true
            docker tag wfm-admin:new wfm-admin:latest
            docker rmi wfm-admin:new
            docker run -d --name wfm-admin --restart unless-stopped \
              -p 127.0.0.1:3004:3000 wfm-admin:latest
            echo "::endgroup::"

            echo "::group::Smoke test"
            sleep 5
            STATUS=$(curl -sI -o /dev/null -w "%{http_code}" -m 10 https://wfm.prodstor.com/)
            if [ "$STATUS" != "307" ] && [ "$STATUS" != "200" ]; then
              echo "FAIL: production returned $STATUS, rolling back"
              docker stop wfm-admin
              docker rm wfm-admin
              docker tag wfm-admin:prev wfm-admin:latest
              docker run -d --name wfm-admin --restart unless-stopped \
                -p 127.0.0.1:3004:3000 wfm-admin:latest
              exit 1
            fi
            echo "OK: https://wfm.prodstor.com/ returned $STATUS"
            echo "::endgroup::"

            echo "::group::Cleanup"
            docker image prune -f --filter "until=24h" 2>&1 | tail -3
            echo "::endgroup::"
