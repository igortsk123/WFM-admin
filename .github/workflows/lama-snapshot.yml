name: Daily LAMA snapshot fetch

on:
  # Daily cron работает на сервере 193.160.208.41 (см. tools/lama/cron-daily.sh
  # + crontab `0 22 * * *`). Там fetch идёт ~30 мин против ~60+ на GitHub
  # runner (LAMA API даёт более жёсткий rate-limit для US IP).
  # Здесь — только manual workflow_dispatch для bootstrap / экстренного теста.
  workflow_dispatch:

# Одновременно только один fetch — параллельный fetch может дать
# rate-limit от LAMA API.
concurrency:
  group: lama-snapshot
  cancel-in-progress: false

jobs:
  fetch:
    name: Fetch + regenerate
    runs-on: ubuntu-latest
    # GitHub runners (US IP) получают более жёсткий rate-limit от LAMA чем
    # локальный fetch. Первый run упёрся в 60 мин timeout. Запас до 90.
    timeout-minutes: 90

    permissions:
      # Нужно для коммита и пуша обратно в main
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Используем PAT/default token — нужен fetch-depth для git push
          fetch-depth: 1
          # Нужен default token с write permission (см. permissions выше)
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore snapshot cache
        # Накопленные snapshot'ы из предыдущих runs — для merge-stats
        # и regenerate (используют ВСЕ snapshot'ы для усреднения).
        # Cache key включает дату — каждый день новый layer, но с restore-keys
        # подхватывает старый.
        uses: actions/cache@v4
        with:
          path: .lama_snapshots
          key: lama-snapshots-${{ github.run_id }}
          restore-keys: |
            lama-snapshots-

      - name: Fetch fresh snapshot
        # Используем стандартную lib (urllib) — нет внешних deps.
        # Скрипт сам сохраняет в .lama_snapshots/{YYYY-MM-DD}.json.
        run: python tools/lama/fetch-snapshot.py

      - name: Regenerate mock data files
        # Перепишет lib/mock-data/_lama-*.ts на основе всех snapshot'ов в кэше.
        run: python tools/lama/regenerate-from-snapshots.py

      - name: Update merged stats (медианы для fallback)
        # Обновляет .lama_snapshots/_merged-stats.json — справочно, для
        # ручного обновления generateDefaultBlocksForStore() при необходимости.
        # Не коммитится (в .gitignore через .lama_snapshots/).
        run: python tools/lama/merge-stats.py

      - name: Commit + push if changed
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Только TS файлы — snapshot'ы в .gitignore
          git add lib/mock-data/_lama-unassigned-blocks.ts \
                  lib/mock-data/_lama-employee-zones.ts \
                  lib/mock-data/_lama-employee-work-types.ts \
                  lib/mock-data/_lama-fallback-medians.ts
          if git diff --cached --quiet; then
            echo "Нет изменений — задачи на сегодня совпадают с кэшем"
            exit 0
          fi
          # Краткая статистика для commit message (однострочный — multi-line
          # внутри run-block ломает YAML indent, см. early failures lama-snapshot)
          BLOCKS_COUNT=$(grep -c "^  { id:" lib/mock-data/_lama-unassigned-blocks.ts || true)
          STORES_COUNT=$(grep -oE 'store_id: [0-9]+' lib/mock-data/_lama-unassigned-blocks.ts | sort -u | wc -l)
          DATE=$(date +%Y-%m-%d)
          git commit -m "chore(lama): daily snapshot $DATE — $BLOCKS_COUNT blocks / $STORES_COUNT stores (auto)"
          git push origin main
